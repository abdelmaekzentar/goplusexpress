<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hors ligne — GO PLUS EXPRESS</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#0f172a;color:#fff;
    font-family:Inter,Arial,sans-serif;text-align:center;padding:24px;
  }
  .logo{width:120px;margin-bottom:24px;border-radius:16px}
  .icon{font-size:4rem;margin-bottom:16px}
  h1{font-size:1.6rem;font-weight:800;margin-bottom:8px;color:#00a99d}
  p{font-size:1rem;color:#94a3b8;margin-bottom:28px;max-width:340px;line-height:1.6}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:14px 28px;background:#00a99d;color:#fff;
    border-radius:12px;text-decoration:none;font-weight:700;
    font-size:.95rem;border:none;cursor:pointer;transition:.2s;
  }
  .btn:hover{background:#0ea5a0;transform:translateY(-2px)}
  .cached{margin-top:20px;font-size:.82rem;color:#475569}
</style>
</head>
<body>
  <img src="assets/logo.png" alt="GO PLUS EXPRESS" class="logo" onerror="this.style.display='none'"/>
  <div class="icon">📡</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion internet et réessayez. Vos pages déjà visitées restent disponibles en cache.</p>
  <button class="btn" onclick="window.location.reload()">
    🔄 Réessayer
  </button>
  <p class="cached">GO PLUS EXPRESS · Transport &amp; Logistique au Maroc</p>
</body>
</html>
