<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Background -->
  <rect x="0" y="0" width="200" height="80" rx="4" fill="#003087"/>

  <!-- White horizontal bar top -->
  <rect x="0" y="0" width="200" height="22" rx="0" fill="#FFFFFF"/>
  <rect x="0" y="0" width="200" height="4" fill="#003087"/>

  <!-- IATA text large -->
  <text x="100" y="58"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="34"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="4">IATA</text>

  <!-- Subtitle top bar -->
  <text x="100" y="13"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="600"
        font-size="9"
        fill="#003087"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="1">INTERNATIONAL AIR TRANSPORT ASSOCIATION</text>
</svg>
