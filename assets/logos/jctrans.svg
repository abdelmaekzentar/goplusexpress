<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Background -->
  <rect x="0" y="0" width="200" height="80" rx="4" fill="#FFFFFF"/>

  <!-- Bande bleue gauche décorative -->
  <rect x="0" y="0" width="6" height="80" fill="#0057A8"/>
  <!-- Bande rouge droite décorative -->
  <rect x="194" y="0" width="6" height="80" fill="#E8001D"/>

  <!-- Globe stylisé -->
  <circle cx="28" cy="38" r="18" fill="none" stroke="#0057A8" stroke-width="2"/>
  <ellipse cx="28" cy="38" rx="9" ry="18" fill="none" stroke="#0057A8" stroke-width="1.5"/>
  <line x1="10" y1="38" x2="46" y2="38" stroke="#0057A8" stroke-width="1.5"/>
  <line x1="12" y1="28" x2="44" y2="28" stroke="#0057A8" stroke-width="1"/>
  <line x1="12" y1="48" x2="44" y2="48" stroke="#0057A8" stroke-width="1"/>

  <!-- JC rouge + TRANS bleu -->
  <text x="57" y="36"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="28"
        fill="#E8001D"
        text-anchor="start"
        dominant-baseline="middle">JC</text>
  <text x="97" y="36"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="28"
        fill="#0057A8"
        text-anchor="start"
        dominant-baseline="middle">TRANS</text>

  <!-- Sous-titre -->
  <text x="113" y="58"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        font-size="8.5"
        fill="#666666"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="0.5">Global Freight Network</text>
</svg>
