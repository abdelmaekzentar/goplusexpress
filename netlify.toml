[build]
  publish = "."

# ═══════════════════════════════════════════════════════
#  SECURITY HEADERS — GO PLUS EXPRESS
#  Applied to all routes
# ═══════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Enforce HTTPS for 1 year + preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Limit Referer leakage to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser feature APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=()"

    # Cross-Origin policies
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"

    # Content Security Policy
    # Note: 'unsafe-inline' for scripts is required due to inline event handlers (onclick=...)
    # and for styles due to dynamic inline styles. Refactoring to event listeners would allow
    # removal of 'unsafe-inline' for scripts in a future iteration.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://cdn.jsdelivr.net https://server.arcgisonline.com https://services.arcgisonline.com blob:; worker-src blob: 'self'; frame-src https://embed.waze.com https://www.vesselfinder.com; child-src blob: 'self' https://embed.waze.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"

# Cache static assets aggressively, but never cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
